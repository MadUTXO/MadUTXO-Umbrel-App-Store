version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: 127.0.0.1
      APP_PORT: 5000
      PROXY_AUTH_ADD: "false"

  server:
    image: libretranslate/libretranslate:v1.9.5
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/data:rw
    environment:
      - TZ=${TZ:-UTC}
    labels:
      yantr.app: "madutxo-libretranslate"
      yantr.service: "LibreTranslate Server"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3