version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: madutxo-opencode_server_1
      APP_PORT: 4096
    depends_on:
      - server

  server:
    image: ghcr.io/anomalyco/opencode:1.1.64@sha256:36c39c41c7906fc327e9c318437c17940036e8e9790e67b0ea7c3a41c8168cae
    command: ["web", "--hostname", "0.0.0.0", "--port", "4096"]
    restart: unless-stopped
    init: true
    stop_grace_period: 1m
    environment:
      HOME: /home/opencode
    volumes:
      - ${APP_DATA_DIR}/data:/home/opencode
