version: "3.7"

services:
  app_proxy:
    depends_on:
      - server
    environment:
      APP_HOST: madutxo-nostr-vpn_server_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  server:
    init: true
    image: ghcr.io/getumbrel/nostr-vpn:v0.3.4@sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
    user: "1000:1000"
    restart: unless-stopped
    stop_grace_period: 1m
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/data:rw
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun:rwm
    environment:
      - NVPN_DATA_DIR=/data
      - HOME=/data
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data: