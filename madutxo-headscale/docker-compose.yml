version: "3.7"

services:
  app_proxy:
    depends_on:
      - headscale
      - ui
    environment:
      APP_HOST: madutxo-headscale_ui_1
      APP_PORT: 80

  headscale:
    image: headscale/headscale:v0.16.2@sha256:placeholder
    user: "1000:1000"
    init: true
    restart: unless-stopped
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/headscale:rw

  ui:
    image: sergeyitsib/headscale-web:latest@sha256:placeholder
    user: "1000:1000"
    init: true
    restart: unless-stopped
    stop_grace_period: 1m

volumes:
  data:
