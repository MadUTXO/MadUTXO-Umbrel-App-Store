version: '3.7'

services:
  main:
    image: hwdsl2/headscale-server:latest
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/headscale:rw
    environment:
      - TZ=${TZ:-UTC}
      - HS_SERVER_URL=${HS_SERVER_URL:-http://192.168.1.1:8080}
      - HS_LISTEN_PORT=8080
      - HS_METRICS_PORT=9090
      - HS_BASE_DOMAIN=headscale.internal
      - HS_USERNAME=admin
      - HS_DNS_SRV1=1.1.1.1
      - HS_DNS_SRV2=1.0.0.1
      - HS_LOG_LEVEL=error
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Generate API key on first run (non-blocking)
        KEY_FILE="/var/lib/headscale/api_key.txt"
        if [ ! -f "$KEY_FILE" ]; then
          /opt/src/run.sh &
          HS_PID=$!
          for i in $(seq 1 30); do [ -S /var/run/headscale/headscale.sock ] && break; sleep 1; done
          sleep 3
          KEY=$(headscale -c /etc/headscale/config.yaml apikeys create --expiration 8760h 2>&1 | grep -oP 'Key: \K[^\s]+' || echo "")
          [ -n "$KEY" ] && echo "$KEY" > "$KEY_FILE" && chmod 600 "$KEY_FILE"
          wait $HS_PID
        else
          exec /opt/src/run.sh
        fi

  ui:
    image: ghcr.io/gurucomputing/headscale-ui:latest
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    environment:
      - TZ=${TZ:-UTC}
      - HTTP_PORT=8083
      - HTTPS_PORT=8445
    labels:
      yantr.app: "madutxo-headscale"
      yantr.service: "Web UI"

  setup:
    image: busybox:latest
    restart: "no"
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data:/data:rw
    command: ["sh", "-c", "httpd -p 8084 -h /data"]
    labels:
      yantr.app: "madutxo-headscale"
      yantr.service: "Setup"
