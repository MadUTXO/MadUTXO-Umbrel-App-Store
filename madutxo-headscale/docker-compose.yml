version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ${APP_MADUTXO_HEADSCALE_IP}
      APP_PORT: ${APP_MADUTXO_HEADSCALE_PORT}
      PROXY_AUTH_ADD: "false"

  server:
    init: true
    image: headscale/headscale:v0.28.0
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    labels:
      yantr.app: "madutxo-headscale"
      yantr.service: "Headscale Server"
    volumes:
      - ${APP_DATA_DIR}/config:/etc/headscale:rw
      - ${APP_DATA_DIR}/data:/var/lib/headscale:rw
    environment:
      - HEADSCALE_CONFIG=/etc/headscale/config.yaml
    command: serve
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3