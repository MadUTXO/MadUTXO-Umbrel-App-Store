version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: madutxo-headscale_ui_1
      APP_PORT: 80

  headscale:
    image: headscale/headscale:v0.28
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/headscale:rw
      - ${APP_DATA_DIR}/config:/etc/headscale:rw
    command: >
      sh -c "
        echo 'Running first-time setup...';
        headscale -c /etc/headscale/config.yaml users create admin 2>/dev/null || true;
        headscale -c /etc/headscale/config.yaml preauthkeys create --user admin --reusable --expiration 8760h 2>/dev/null || true;
        echo 'Setup complete, starting server...';
        exec headscale -c /etc/headscale/config.yaml serve;
      "

  ui:
    image: sergeyitsib/headscale-web:latest
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "9080:80"

volumes:
  data: