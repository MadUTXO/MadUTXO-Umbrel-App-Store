version: '3.7'

services:
  main:
    image: hwdsl2/headscale-server:latest
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ${APP_DATA_DIR}/data:/var/lib/headscale:rw
    environment:
      - TZ=${TZ:-UTC}
      - HS_SERVER_URL=${HS_SERVER_URL:-http://192.168.1.1:8080}
      - HS_LISTEN_PORT=8080
      - HS_METRICS_PORT=9090
      - HS_BASE_DOMAIN=headscale.internal
      - HS_USERNAME=admin
      - HS_DNS_SRV1=1.1.1.1
      - HS_DNS_SRV2=1.0.0.1
      - HS_LOG_LEVEL=error
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Auto-generate API key on first run
        KEY_FILE="/var/lib/headscale/api_key.txt"
        if [ ! -f "$KEY_FILE" ]; then
          echo "=== Generating API Key ==="
          /opt/src/run.sh &
          HS_PID=$!
          # Wait for headscale to initialize
          for i in $(seq 1 30); do
            if [ -S /var/run/headscale/headscale.sock ]; then
              break
            fi
            sleep 1
          done
          # Generate API key (expires in 1 year for convenience)
          KEY_OUTPUT=$(headscale -c /etc/headscale/config.yaml apikeys create --expiration 8760h 2>&1)
          KEY=$(echo "$KEY_OUTPUT" | grep -oP 'Key: \K[^\s]+' || echo "")
          if [ -n "$KEY" ]; then
            echo "$KEY" > "$KEY_FILE"
            chmod 600 "$KEY_FILE"
            echo "API Key generated and saved."
            echo "=========================================="
            echo "IMPORTANT: Save this API key!"
            echo "$KEY"
            echo "=========================================="
            echo "You can also find it in: $KEY_FILE"
            echo "=========================================="
          fi
          wait $HS_PID
        else
          echo "API Key already exists. Starting Headscale..."
          exec /opt/src/run.sh
        fi

  ui:
    image: ghcr.io/gurucomputing/headscale-ui:latest
    restart: on-failure
    stop_grace_period: 1m
    network_mode: host
    environment:
      - TZ=${TZ:-UTC}
      - HTTP_PORT=8083
      - HTTPS_PORT=8445
    labels:
      yantr.app: "madutxo-headscale"
      yantr.service: "Web UI"
