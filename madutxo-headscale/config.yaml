---
# Headscale configuration for Umbrel
# All data stored in /etc/headscale (mounted from APP_DATA_DIR)

server:
  # Listen addresses
  listen_addr: 0.0.0.0:8080
  metrics_listen_addr: 0.0.0.0:9090

  # Private key path (will be generated if missing)
  private_key_path: /etc/headscale/private.key

  # Base domain for nodes
  base_domain: headscale.internal

  # DERP (relay) server config
  derp:
    server:
      enabled: false

  # Database config (SQLite in the config directory)
  db_type: sqlite3
  db_path: /etc/headscale/db.sqlite

  # Logging
  log:
    format: text
    level: info

  # ACL policy (empty = allow all)
  acl_policy_path: ""

  # Unix socket (disabled in container)
  unix_socket: ""
  unix_socket_permission: "0770"

# CLI authentication
cli:
  auth_key: ""
  insecure: false