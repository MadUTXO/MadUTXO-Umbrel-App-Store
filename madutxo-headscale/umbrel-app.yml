manifestVersion: 1
id: madutxo-headscale
category: networking
name: Headscale
icon: https://raw.githubusercontent.com/MadUTXO/community-umbrel-apps/master/madutxo-headscale/icon.png
version: "v0.28.0"
tagline: Open source Tailscale control server
description: >-
  Headscale is an open source implementation of the Tailscale control server.
  Run your own VPN using official Tailscale clients.


  First-time setup:
  1. Visit port 8084 to get your API key (wait ~10 seconds after install)
  2. Open Web UI at port 8083
  3. Enter API URL: http://YOUR_IP:8080
  4. Paste the key
  5. Create pre-auth keys to connect devices


  Connect: tailscale up --login-server http://YOUR_IP:8080 --authkey <key>
