version: "v0.28"
tagline: Open source Tailscale control server
description: >-
  Headscale is an open source implementation of the Tailscale control server.
  Run your own VPN using official Tailscale clients.

  The API key is auto-generated on first start. Open Web UI at port 9080
  and enter the server URL (http://YOUR_IP:8080) and the API key from logs.

  Connect: tailscale up --login-server http://YOUR_IP:8080 --authkey <key>
developer: Headscale team
website: https://headscale.net
