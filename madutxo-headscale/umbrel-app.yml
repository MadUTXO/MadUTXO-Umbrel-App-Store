manifestVersion: 1
id: madutxo-headscale
category: networking
name: Headscale
icon: https://raw.githubusercontent.com/MadUTXO/MadUTXO-Umbrel-App-Store/master/madutxo-headscale/icon.png
version: "v0.28"
tagline: Open source Tailscale control server
description: >-
  Headscale is an open source implementation of the Tailscale control server.
  Run your own VPN using official Tailscale clients.

  First-time setup:
  1. Open Web UI at port 3000
  2. Run: docker exec madutxo-headscale_headscale_1 headscale apikeys create --expiration 8760h
  3. Copy the API key and paste in the UI

  Connect: tailscale up --login-server http://YOUR_IP:8080 --authkey <key>
developer: Headscale team
website: https://headscale.net
