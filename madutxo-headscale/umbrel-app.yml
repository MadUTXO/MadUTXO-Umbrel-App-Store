manifestVersion: 1
id: madutxo-headscale
category: networking
name: Headscale
icon: https://raw.githubusercontent.com/MadUTXO/community-umbrel-apps/master/madutxo-headscale/icon.png
version: "v0.28.0"
tagline: Open source Tailscale control server
description: >-
  Headscale is an open source implementation of the Tailscale control server.
  It provides a self-hosted alternative to Tailscale's SaaS control server,
  allowing you to run your own VPN coordination server.


  Quick Setup (one time):
  1. Click the icon to open the Web UI (port 8083)
  2. Run this command to get your API key:
     docker exec madutxo-headscale_main_1 cat /var/lib/headscale/api_key.txt
  3. In the Web UI:
     - Enter API URL: http://<your-umbrel-ip>:8080
     - Paste the API key
  4. Create a pre-auth key in the Web UI
  5. Connect devices:
     tailscale up --login-server http://<your-umbrel-ip>:8080 --authkey <key>
